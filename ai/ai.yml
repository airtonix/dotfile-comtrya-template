---
#
# General Ai Files.
#
# Guidelines: Avoid platform specific idioms, stick to:
# - plain commands
# - standard skill spec
# - AGENTS.md

depends:
  - devtools.pi

actions:
  - action: command.run
    command: mkdir
    where: os.name == "linux" || os.name == "macos"
    args:
      - -p
      - "{{user.home_dir}}/.pi/agent"
      - "{{user.home_dir}}/.config/opencode"

  - action: file.link
    to: "{{user.home_dir}}/.pi/agent/prompts"
    from: commands

  - action: file.link
    to: "{{user.home_dir}}/.pi/agent/skills"
    from: skills

  - action: file.link
    to: "{{user.home_dir}}/.pi/agent/AGENTS.md"
    from: AGENTS.md

  - action: file.link
    to: "{{user.home_dir}}/.config/opencode/command"
    from: commands

  - action: file.link
    to: "{{user.home_dir}}/.config/opencode/skills"
    from: skills
